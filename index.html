<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Scalp Intel | Day Trading Signals</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Antigravity scalp·pro</h1>
            <p class="subtitle">High-frequency buy/sell signals & aggressive risk management.</p>
        </header>

        <main class="dashboard-grid">
            
            <!-- Balance Card -->
            <section class="card" id="trading-setup">
                <div class="card-title">
                    <i class="fas fa-wallet"></i>
                    <h2>Exchange Balances</h2>
                </div>
                <div class="status-grid">
                    <div class="status-item">
                        <span>Bitvavo</span>
                        <span id="bitvavo-balance" class="value">0.00 EUR</span>
                    </div>
                    <div class="status-item">
                        <span>Kraken Futures</span>
                        <span id="kraken-balance" class="value">0.00 USD</span>
                    </div>
                </div>
                <div style="margin-top: 1rem; border-top: 1px solid var(--glass-border); padding-top: 1rem;">
                    <div class="status-header">
                        <span>System Mode: <span id="trading-mode" style="font-weight: 700;">READ-ONLY</span></span>
                        <button id="toggle-trading" class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.8rem;">
                            <i class="fas fa-power-off"></i> ENABLE LIVE TRADING
                        </button>
                    </div>
                </div>
            </section>

            <!-- Active Positions Section -->
            <section class="card" id="active-positions">
                <div class="card-title">
                    <i class="fas fa-chart-line"></i>
                    <h2>Active Trades</h2>
                </div>
                <div id="positions-list" class="activity-container">
                    <div class="activity-empty">Searching for entries...</div>
                </div>
            </section>
        </main>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
